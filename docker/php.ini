; docker/php.ini

; == IONCUBE ==================================================================
zend_extension=/usr/local/lib/php/extensions/ioncube_loader_lin_8.4.so

; == ERROR HANDLING ===========================================================
expose_php                  = Off       ; Don't advertise PHP version in headers
display_errors              = Off       ; Never show errors to the browser in prod
display_startup_errors      = Off       ; Hide startup errors
log_errors                  = On        ; Enable error logging
error_log                   = /proc/self/fd/2 ; Route PHP errors to Docker stderr
html_errors                 = Off       ; Plain text errors (no HTML markup in logs)
error_reporting             = E_ALL & ~E_DEPRECATED & ~E_STRICT
ignore_repeated_errors      = On        ; Don't flood logs with duplicate errors
ignore_repeated_source      = Off       ; But do log same error from different sources
log_errors_max_len          = 4096      ; Max error message length in bytes

; == RESOURCE LIMITS ==========================================================
memory_limit                = 128M      ; Max memory per script
max_execution_time          = 15        ; Max script runtime (seconds)
max_input_time              = 30        ; Max time to parse request input
max_input_vars              = 1000      ; Cap input variables (DoS mitigation)
max_input_nesting_level     = 64        ; Cap array nesting depth
output_buffering            = 4096      ; Buffer output in 4KB chunks
realpath_cache_size         = 4096K     ; Cache resolved file paths
realpath_cache_ttl          = 600       ; How long to cache resolved paths (seconds)

; == FILE UPLOADS =============================================================
file_uploads                = On
upload_tmp_dir              = /tmp
upload_max_filesize         = 100M
post_max_size               = 120M
max_file_uploads            = 20        ; Cap simultaneous uploads

; == SESSION SECURITY =========================================================
session.use_strict_mode     = 1         ; Reject unrecognized session IDs (prevents fixation)
session.use_only_cookies    = 1         ; No session IDs in URLs
session.use_trans_sid       = 0         ; Explicitly disable URL session propagation
session.cookie_httponly     = 1         ; JS cannot access session cookie
session.cookie_secure       = 1         ; HTTPS only — disable if testing over HTTP locally
session.cookie_samesite     = Strict    ; No cross-site cookie sending (CSRF mitigation)
session.cookie_lifetime     = 0         ; Cookie expires when browser closes
session.gc_maxlifetime      = 1800      ; Server-side session data expires after 30 min
session.gc_probability      = 1         ; GC runs 1-in-100 requests (gc_probability/gc_divisor)
session.gc_divisor          = 100
session.entropy_length      = 32        ; Entropy bytes for session ID generation
session.hash_bits_per_character = 6     ; Compact but strong session ID encoding
session.sid_length          = 48        ; Session ID character length
session.sid_bits_per_character = 6
session.cache_limiter       = nocache   ; Prevent session pages being cached by browser/proxy
session.referer_check       =           ; Leave empty — referer headers aren't reliable

; == SERVER SECURITY ==========================================================
open_basedir                = /var/www/html:/tmp  ; Restrict filesystem access to these paths
ignore_user_abort           = Off       ; Stop execution if client disconnects
default_socket_timeout      = 20        ; Timeout for socket-based operations
allow_url_fopen             = Off       ; Disable remote file reads via URLs
allow_url_include           = Off       ; Disable remote file includes (RFI prevention)
enable_dl                   = Off       ; Disable runtime dynamic extension loading
cgi.force_redirect          = 1         ; Required if running as CGI (safe default)

; Disable dangerous functions
; These allow shell access, process spawning, or system introspection
disable_functions = exec,passthru,shell_exec,system,proc_open,popen,\
                    pcntl_exec,pcntl_fork,pcntl_signal,\
                    posix_kill,posix_setuid,posix_setgid,\
                    phpinfo,php_uname,getmyuid,getmypid,\
                    leak,listen,diskfreespace,tmpfile,link,\
                    apache_child_terminate,apache_setenv,\
                    define_syslog_variables,escapeshellarg,escapeshellcmd

; == MAIL =====================================================================
; Disable sendmail entirely as we use SMTP
sendmail_path               = /bin/false ; Drop all mail() calls silently

; == OPCACHE ==================================================================
opcache.enable              = 1         ; Enable opcode caching
opcache.enable_cli          = 0         ; No benefit for CLI in this stack
opcache.memory_consumption  = 256       ; MB of shared memory for opcode cache
opcache.interned_strings_buffer = 16    ; MB for interned string storage
opcache.max_accelerated_files = 20000   ; Max files in cache (tune to file count)
opcache.validate_timestamps = 0         ; Don't check file mtimes on each request (prod)
opcache.revalidate_freq     = 0         ; Irrelevant when validate_timestamps=0
opcache.fast_shutdown       = 1         ; Skip object destructors on shutdown
opcache.save_comments       = 1         ; Required for annotations/docblock-based frameworks
opcache.protect_memory      = 0         ; Enable to 1 only when debugging cache corruption
opcache.consistency_checks  = 0         ; Performance cost — leave off unless debugging

; JIT — PHP 8.x only
; 1255 = TRACING mode (best for long-running web workloads)
; IonCube historically has had conflicts with JIT, if issues are encountered I will disable this
opcache.jit                 = 1255
opcache.jit_buffer_size     = 64M

; == MISC =====================================================================
default_charset             = "UTF-8"
default_mimetype            = "text/html"
date.timezone               = "UTC"     ; Always set explicitly — avoids warnings and drift
short_open_tag              = Off       ; Require full <?php tags
precision                   = 14        ; Floating point display precision
serialize_precision         = -1        ; Lossless float serialization (PHP 7.1+)
zend.detect_unicode         = On        ; Detect BOM in PHP files
